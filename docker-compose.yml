services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: proofdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/proofdb
      UPLOADS_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    ports: ["8000:8000"]
    depends_on: [db]
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [backend]
